  { id: "ch4_1", title: "4.1 Social Interaction and Conversation Mechanisms", content: `In HCI, social interaction refers to how people communicate and collaborate through technology. Conversation mechanisms describe ways users share information, work together, and stay socially connected.

Co-presence where people share a common environment and know others are present;
Remote conversation which uses technology to communicate when apart (text, video, voice);
Collaboration allowing people to work together on tasks using shared tools;
Sharable interfaces that different users can interact with at the same time.

Modern digital social media and communication tools enable global reach, easy information sharing, community engagement, and real-time interaction. However, they also create risks such as privacy concerns, inauthentic expression, and social overload. Social interaction in HCI considers both human-human communication and how interfaces support these social mechanisms. ` },
  { id: "ch4_2", title: "4.2 Emotional Design", content: `Emotional design focuses on how products make users feel. Don Norman described three levels of emotional processing in design:

Behavioural design which is learned responses during use based on usability and performance;
Reflective design which is slow conscious thought about meaning, memories, and personal value.

Good emotional design aims not only for usability but also for satisfying, engaging, and meaningful experiences. Designers pay attention to aesthetics, interaction quality, feedback, and personal meaning. Emotional design helps build trust, delight, and long-term attachment to products. ` },

Anthropomorphism in interaction design is the attribution of human‑like qualities to machines and interfaces, such as virtual assistants or chatbots. This can make interactions feel more natural and engaging but must be used carefully to manage user expectations and avoid deception.

  // Application class
  class NotesApplication {
    constructor() {
      this.selectedNote = allTopics[0];
      this.isSidebarOpen = window.innerWidth <= 780 ? false : true;
      this.init();

    init() {
      this.render();
      this.bindEvents();
      window.addEventListener('resize', () => {
        if (window.innerWidth > 780) {
          this.isSidebarOpen = true;
        } else {
          this.isSidebarOpen = false;
        }
        this.render();
        this.bindEvents();
      });
    }

      }

      this.bindEvents();

      this.render();

      }

      const root = document.getElementById('root');

          topicItemsHtml += `<div class="chapter-group">
            <div class="chapter-heading">${escapeHtml(chapterGroups[i].title)}</div>
            <ul class="topic-list">`;
          chapterGroups[i].topics.forEach(topic => {

              <div class="note-content">

              </div>
            </div>
            <div class="footer-note">

              HCI401T — Semester Test Preparation | Tshwane University of Technology
            </div>
          </main>
        </div>
      `;

          const id = item.getAttribute('data-id');
          const found = allTopics.find(t => t.id === id);
          if (found) this.setSelectedNote(found);
        };
        item.removeEventListener('click', this._topicHandler);
        this._topicHandler = clickHandler;
        item.addEventListener('click', this._topicHandler);
      });

      const menuBtn = document.getElementById('menuToggleBtn');
      if (menuBtn) {
        const toggleHandler = () => this.toggleSidebar();
        menuBtn.removeEventListener('click', this._toggleBound);

        menuBtn.addEventListener('click', this._toggleBound);
      }

      const backdrop = document.getElementById('backdropEl');

        backdrop.removeEventListener('click', this._backdropBound);
        this._backdropBound = closeHandler;
        backdrop.addEventListener('click', this._backdropBound);
      }
    }

  function escapeHtml(str) {
    if (!str) return '';
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }
