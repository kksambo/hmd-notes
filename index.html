HTA breaks tasks into subtasks in hierarchy.

Structure:
0. Main task goal
  1. Plan 1
    1.1. Subtask 1
    1.2. Subtask 2
  2. Plan 2
    2.1. Subtask 1

Plans: specify order or conditions (do 1.1, then 1.2; if error, do 1.3).

Benefits:
• Identifies all user activities
• Reveals task complexity
• Informs interface structure
• Helps design error recovery

0. Make coffee
  1. Get coffee (plan: 1.1 then 1.2)

    1.2. Take coffee jar
  2. Boil water (plan: 2.1 then 2.2)
    2.1. Fill kettle
    2.2. Switch on` },
    { id: "ch7_5", title: "7.5 Prioritizing Requirements", content: `PRIORITIZING REQUIREMENTS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

Not all requirements equal; must prioritize within constraints.

MOSCOW Method:
• Must have: critical for success
• Should have: important but not vital
• Could have: nice to have if time/resources permit
• Won't have: explicitly excluded for this release

Kano Model:
• Basic needs: expected; absence causes dissatisfaction
• Performance needs: linear satisfaction; more is better
• Excitement needs: unexpected delights; create satisfaction

Factors: business value, user value, technical feasibility, cost, risk, dependencies.` },
    { id: "ch7_6", title: "7.6 From Requirements to Design", content: `FROM REQUIREMENTS TO DESIGN
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

Requirements inform:
• User tasks and workflows
• Functional features
• Usability goals (effectiveness, efficiency, satisfaction)
• UX goals (engaging, motivating, pleasurable)
• Technical constraints
• Accessibility needs

Traceability: ensure design decisions align with requirements.

Iterative refinement: requirements evolve as understanding deepens.

Validation: verify that design meets requirements (inspection, evaluation, user testing).

Key insight: Requirements are not fixed; they emerge and refine throughout design process.` },
    { id: "ch7_7", title: "7.7 Key Takeaways: Requirements", content: `CHAPTER 7 KEY POINTS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

✓ Requirements: functional, non-functional, data, environmental, user characteristics
✓ Data gathering methods: interviews, observation, questionnaires, document analysis, diaries
✓ Triangulation: combine multiple methods for comprehensive understanding
✓ Analysis techniques: affinity diagrams, personas, scenarios, use cases, user stories
✓ Hierarchical Task Analysis (HTA): breaks tasks into structured hierarchy with plans
✓ Prioritization: MOSCOW (Must/Should/Could/Won't), Kano model (basic, performance, excitement)
✓ Requirements drive design; traceability ensures alignment
✓ Requirements evolve iteratively; validation confirms design meets needs

REQUIREMENTS GATHERING PRINCIPLES
• Focus on users and their goals
• Observe what people do, not just what they say
• Involve stakeholders throughout
• Understand context of use
• Be prepared to iterate and refine` }
  ];

  // Combine all topics
  const allTopics = [
    ...chapter1Topics.map(t => ({ ...t, chapter: 1, chapterTitle: "Chapter 1: What is Interaction Design?" })),
    ...chapter2Topics.map(t => ({ ...t, chapter: 2, chapterTitle: "Chapter 2: The Process of Interaction Design" })),
    ...chapter3Topics.map(t => ({ ...t, chapter: 3, chapterTitle: "Chapter 3: Cognitive Aspects" })),
    ...chapter4Topics.map(t => ({ ...t, chapter: 4, chapterTitle: "Chapter 4: Social Interaction & Emotional Design" })),
    ...chapter5Topics.map(t => ({ ...t, chapter: 5, chapterTitle: "Chapter 5: Interfaces & Interaction Types" })),
    ...chapter6Topics.map(t => ({ ...t, chapter: 6, chapterTitle: "Chapter 6: Evaluation & Prototyping" })),
    ...chapter7Topics.map(t => ({ ...t, chapter: 7, chapterTitle: "Chapter 7: Data Gathering, Requirements & Analysis" }))
  ];

  // Application class
  class NotesApplication {
    constructor() {
      this.selectedNote = allTopics[0];
      this.isSidebarOpen = window.innerWidth <= 780 ? false : true;
      this.init();
    }

    init() {
      this.render();
      this.bindEvents();
      window.addEventListener('resize', () => {
        if (window.innerWidth > 780) {
          this.isSidebarOpen = true;
        } else {
          this.isSidebarOpen = false;
        }
        this.render();
        this.bindEvents();
      });
    }

    setSelectedNote(note) {
      this.selectedNote = note;
      if (window.innerWidth <= 780) {
        this.isSidebarOpen = false;
      }
      this.render();
      this.bindEvents();
    }

    toggleSidebar() {
      this.isSidebarOpen = !this.isSidebarOpen;
      this.render();
      this.bindEvents();
    }

    closeSidebar() {
      if (window.innerWidth <= 780) {
        this.isSidebarOpen = false;
        this.render();
        this.bindEvents();
      }
    }

    render() {
      const root = document.getElementById('root');
      if (!root) return;

      const activeNote = this.selectedNote;

      let chapterGroups = {};
      for (let i = 1; i <= 7; i++) {
        chapterGroups[i] = { title: "", topics: [] };
      }
      allTopics.forEach(topic => {
        chapterGroups[topic.chapter].title = topic.chapterTitle;
        chapterGroups[topic.chapter].topics.push(topic);
      });

      let topicItemsHtml = '';
      for (let i = 1; i <= 7; i++) {
        if (chapterGroups[i].topics.length > 0) {
          topicItemsHtml += `<div class="chapter-group">
            <div class="chapter-heading">${escapeHtml(chapterGroups[i].title)}</div>
            <ul class="topic-list">`;
          chapterGroups[i].topics.forEach(topic => {
            const isActive = activeNote.id === topic.id;
            topicItemsHtml += `<li class="topic-item ${isActive ? 'active' : ''}" data-id="${topic.id}">${escapeHtml(topic.title)}</li>`;
          });
          topicItemsHtml += `</ul></div>`;
        }
      }

      const sidebarClass = this.isSidebarOpen ? 'sidebar open' : 'sidebar';
      const backdropClass = (this.isSidebarOpen && window.innerWidth <= 780) ? 'backdrop show' : 'backdrop';

      const html = `
        <div class="app">
          <div class="mobile-header">
            <button class="hamburger" id="menuToggleBtn" aria-label="Menu">☰</button>
            <span>HCI401T • Interaction Design</span>
          </div>
          <div class="${backdropClass}" id="backdropEl"></div>
          <aside class="${sidebarClass}" id="sidebarNav">
            <div class="sidebar-header">
              <h1>HMD</h1>
              <p>Rogers, Sharp & Preece (2023)<br>Complete Notes • Chapters 1–7</p>
            </div>
            <div class="sidebar-topics-container">
              ${topicItemsHtml}
            </div>
            <div class="footer-note-sidebar">
              ${allTopics.length} topics • All chapters • Semester Test Prep
            </div>
          </aside>
          <main class="main-content">
            <div class="note-card">
              <div class="note-header">
                <h2>${escapeHtml(activeNote.title)}</h2>
              </div>
              <div class="note-content">
                <pre>${escapeHtml(activeNote.content)}</pre>
              </div>
            </div>
            <div class="footer-note">
             Yvonne Rogers, Helen Sharp, Jenny Preece • Interaction Design: beyond human-computer interaction (2023)<br>
              HCI401T — Semester Test Preparation | Tshwane University of Technology
            </div>
          </main>
        </div>
      `;

      root.innerHTML = html;
    }

    bindEvents() {
      const topicItems = document.querySelectorAll('.topic-item');
      topicItems.forEach(item => {
        const clickHandler = () => {
          const id = item.getAttribute('data-id');
          const found = allTopics.find(t => t.id === id);
          if (found) this.setSelectedNote(found);
        };
        item.removeEventListener('click', this._topicHandler);
        this._topicHandler = clickHandler;
        item.addEventListener('click', this._topicHandler);
      });

      const menuBtn = document.getElementById('menuToggleBtn');
      if (menuBtn) {
        const toggleHandler = () => this.toggleSidebar();
        menuBtn.removeEventListener('click', this._toggleBound);
        this._toggleBound = toggleHandler;
        menuBtn.addEventListener('click', this._toggleBound);
      }

      const backdrop = document.getElementById('backdropEl');
      if (backdrop) {
        const closeHandler = () => this.closeSidebar();
        backdrop.removeEventListener('click', this._backdropBound);
        this._backdropBound = closeHandler;
        backdrop.addEventListener('click', this._backdropBound);
      }
    }
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  document.addEventListener('DOMContentLoaded', () => {
    window.app = new NotesApplication();
  });
</script>
</body>
</html>
